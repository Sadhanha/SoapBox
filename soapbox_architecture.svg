<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">Soapbox — Agent Architecture</text>

  <!-- Provider Input -->
  <rect x="190" y="50" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="77" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Provider pastes clinical notes</text>

  <!-- Arrow down -->
  <line x1="340" y1="94" x2="340" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streamlit UI -->
  <rect x="190" y="124" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text x="340" y="148" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Streamlit UI</text>
  <text x="340" y="167" text-anchor="middle" font-size="11" fill="#534AB7">User-facing interface</text>

  <!-- Arrow down then split -->
  <line x1="340" y1="180" x2="340" y2="205" stroke="#888780" stroke-width="1.5"/>
  <!-- Left branch -->
  <path d="M340 205 L160 205 L160 240" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Right branch -->
  <path d="M340 205 L520 205 L520 240" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAG Pipeline -->
  <rect x="60" y="240" width="200" height="60" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="160" y="264" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">RAG Pipeline</text>
  <text x="160" y="281" text-anchor="middle" font-size="11" fill="#0F6E56">143 clinical notes</text>
  <text x="160" y="295" text-anchor="middle" font-size="11" fill="#0F6E56">Hugging Face embeddings</text>

  <!-- Claude API -->
  <rect x="420" y="240" width="200" height="60" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.8"/>
  <text x="520" y="264" text-anchor="middle" font-size="13" font-weight="500" fill="#4A1B0C">Claude API</text>
  <text x="520" y="281" text-anchor="middle" font-size="11" fill="#712B13">Anthropic LLM</text>
  <text x="520" y="295" text-anchor="middle" font-size="11" fill="#712B13">Note generation</text>

  <!-- Merge arrows into SOAP Note -->
  <path d="M160 300 L160 360 L310 360" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M520 300 L520 360 L370 360" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SOAP Note Generation -->
  <rect x="180" y="340" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.8"/>
  <text x="340" y="364" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">SOAP Note Generation</text>
  <text x="340" y="382" text-anchor="middle" font-size="11" fill="#185FA5">Structured clinical output</text>

  <!-- Arrow down -->
  <line x1="340" y1="396" x2="340" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Evaluation -->
  <rect x="180" y="426" width="320" height="60" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="340" y="450" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">LLM Self-Evaluation</text>
  <text x="340" y="468" text-anchor="middle" font-size="11" fill="#633806">Quality · Completeness · Accuracy</text>
  <text x="340" y="483" text-anchor="middle" font-size="11" fill="#633806">LLM-as-judge pattern</text>

  <!-- Arrow down -->
  <line x1="340" y1="486" x2="340" y2="516" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Evaluation Dashboard -->
  <rect x="180" y="516" width="320" height="56" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.8"/>
  <text x="340" y="540" text-anchor="middle" font-size="13" font-weight="500" fill="#173404">Evaluation Dashboard</text>
  <text x="340" y="558" text-anchor="middle" font-size="11" fill="#3B6D11">Provider reviews flagged scores</text>

  <!-- Arrow down -->
  <line x1="340" y1="572" x2="340" y2="598" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sign Off -->
  <rect x="240" y="598" width="200" height="16" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="611" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">Provider sign-off</text>

</svg>